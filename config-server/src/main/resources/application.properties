spring.application.name=config-server
server.port=${SERVER_PORT:8888}

spring.profiles.active=${CONFIG_SERVER_PROFILE:native}
spring.cloud.config.server.native.search-locations=${CONFIG_NATIVE_SEARCH_LOCATIONS:file:../config,file:./config}
spring.cloud.config.server.git.uri=${CONFIG_GIT_URI:}
spring.cloud.config.server.git.search-paths=${CONFIG_GIT_SEARCH_PATHS:config}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.info.env.enabled=true
info.application.name=${spring.application.name}
info.application.description=Spring Cloud Config Server

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [${spring.application.name:application}] [%thread] %logger{36} - %msg%n