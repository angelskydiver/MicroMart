spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.database=postgresql
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/microservice}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

eureka.instance.prefer-ip-address=true
eureka.client.service-url.default-zone=${EUREKA_URI:http://localhost:8761/eureka}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.topic.name=${NOTIFICATION_TOPIC:notificationTopic}

security.jwt.secret=${JWT_SECRET:}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
application.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
application.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
application.admin.username=${ADMIN_USERNAME:admin}
application.admin.email=${ADMIN_EMAIL:admin@example.com}
application.admin.password-hash=${ADMIN_PASSWORD_HASH:}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.info.env.enabled=true
info.application.name=${spring.application.name}
info.application.description=${application-description}
info.application.version=${application-version}

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [${spring.application.name:application}] [%thread] %logger{36} - %msg%n

application-description=Spring Boot Microservices Reference Platform
application-license=API Licence
application-version=1.0