x-service-env: &service-env
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
  CONFIG_SERVER_URI: http://config-server:8888
  EUREKA_URI: http://eureka-server:8761/eureka
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-microservice}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
  HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO:-validate}
  KAFKA_BOOTSTRAP_SERVERS: kafka:9093
  NOTIFICATION_TOPIC: ${NOTIFICATION_TOPIC:-notificationTopic}
  NOTIFICATION_CONSUMER_GROUP: ${NOTIFICATION_CONSUMER_GROUP:-notification}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
  JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
  ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
  ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
  JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError}

services:
  postgres:
    image: postgres:16.4
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-microservice}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices

  zookeeper:
    image: bitnami/zookeeper:3.9.2
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    volumes:
      - zookeeper_data:/bitnami
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/zookeeper/bin/zkServer.sh status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices

  kafka:
    image: bitnami/kafka:3.7.1
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_LISTENERS: INTERNAL://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:${KAFKA_HOST_PORT:-9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
    volumes:
      - kafka_data:/bitnami
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9093 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - microservices

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "${KAFKA_UI_HOST_PORT:-9090}:8080"
    networks:
      - microservices

  config-server:
    build:
      context: ./config-server
    image: spring-boot-microservices/config-server:local
    container_name: config-server
    restart: unless-stopped
    environment:
      SERVER_PORT: ${CONFIG_SERVER_PORT:-8888}
      CONFIG_SERVER_PROFILE: ${CONFIG_SERVER_PROFILE:-native}
      CONFIG_NATIVE_SEARCH_LOCATIONS: ${CONFIG_NATIVE_SEARCH_LOCATIONS:-file:/config}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError}
    volumes:
      - ./config:/config:ro
    ports:
      - "${CONFIG_SERVER_HOST_PORT:-8888}:8888"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${CONFIG_SERVER_PORT:-8888}/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices

  eureka-server:
    build:
      context: ./eureka-server
    image: spring-boot-microservices/eureka-server:local
    container_name: eureka-server
    restart: unless-stopped
    environment:
      SERVER_PORT: ${EUREKA_SERVER_PORT:-8761}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError}
    ports:
      - "${EUREKA_HOST_PORT:-8761}:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${EUREKA_SERVER_PORT:-8761}/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices

  gateway:
    build:
      context: ./gateway
    image: spring-boot-microservices/gateway:local
    container_name: gateway
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: ${GATEWAY_PORT:-8080}
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      GATEWAY_DISCOVERY_LOCATOR_ENABLED: ${GATEWAY_DISCOVERY_LOCATOR_ENABLED:-true}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${GATEWAY_PORT:-8080}/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices

  auth-service:
    build:
      context: ./auth-service
    image: spring-boot-microservices/auth-service:local
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      <<: *service-env
      SERVER_PORT: ${AUTH_SERVICE_PORT:-8081}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${AUTH_SERVICE_PORT:-8081}/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices

  user-service:
    build:
      context: ./user-service
    image: spring-boot-microservices/user-service:local
    container_name: user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      <<: *service-env
      SERVER_PORT: ${USER_SERVICE_PORT:-8082}
      USER_SERVICE_DB_SCHEMA: ${USER_SERVICE_DB_SCHEMA:-user_service}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${USER_SERVICE_PORT:-8082}/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices

  job-service:
    build:
      context: ./job-service
    image: spring-boot-microservices/job-service:local
    container_name: job-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_started
      file-storage:
        condition: service_started
    environment:
      <<: *service-env
      SERVER_PORT: ${JOB_SERVICE_PORT:-8083}
      JOB_SERVICE_DB_SCHEMA: ${JOB_SERVICE_DB_SCHEMA:-job_service}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${JOB_SERVICE_PORT:-8083}/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices

  notification-service:
    build:
      context: ./notification-service
    image: spring-boot-microservices/notification-service:local
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      <<: *service-env
      SERVER_PORT: ${NOTIFICATION_SERVICE_PORT:-8084}
      NOTIFICATION_SERVICE_DB_SCHEMA: ${NOTIFICATION_SERVICE_DB_SCHEMA:-notification_service}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${NOTIFICATION_SERVICE_PORT:-8084}/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices

  file-storage:
    build:
      context: ./file-storage
    image: spring-boot-microservices/file-storage:local
    container_name: file-storage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      <<: *service-env
      SERVER_PORT: ${FILE_STORAGE_PORT:-8085}
      FILE_STORAGE_DB_SCHEMA: ${FILE_STORAGE_DB_SCHEMA:-file_storage}
      FILE_STORAGE_PATH: /data/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5MB}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-5MB}
    volumes:
      - file_storage_data:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${FILE_STORAGE_PORT:-8085}/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices

networks:
  microservices:
    driver: bridge

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
  file_storage_data:
