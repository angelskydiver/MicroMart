server.port=${SERVER_PORT:0}

application-title=Job Service

spring.application.name=job-service

spring.flyway.schemas=${JOB_SERVICE_DB_SCHEMA:job_service}
spring.flyway.default-schema=${JOB_SERVICE_DB_SCHEMA:job_service}
spring.jpa.properties.hibernate.default_schema=${JOB_SERVICE_DB_SCHEMA:job_service}

spring.kafka.producer.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.topic.name=${NOTIFICATION_TOPIC:notificationTopic}

spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}