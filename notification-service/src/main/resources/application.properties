server.port=${SERVER_PORT:0}

spring.application.name=notification-service

spring.flyway.schemas=${NOTIFICATION_SERVICE_DB_SCHEMA:notification_service}
spring.flyway.default-schema=${NOTIFICATION_SERVICE_DB_SCHEMA:notification_service}
spring.jpa.properties.hibernate.default_schema=${NOTIFICATION_SERVICE_DB_SCHEMA:notification_service}

spring.kafka.consumer.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${NOTIFICATION_CONSUMER_GROUP:notification}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.topic.name=${NOTIFICATION_TOPIC:notificationTopic}

spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}